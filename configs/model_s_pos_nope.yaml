# Wave B ablation: RoPE -> NoPE (no explicit positional signal at all -- the causal mask is the
# only thing telling the model about order). Everything else identical to model_s.yaml (D-016
# defaults). See docs/phases/phase5_ablations.md Wave B.

vocab_size: 16000
d_model: 192
n_layers: 15
n_heads: 3
n_kv_heads: 3
head_dim: 64
max_seq_len: 512
dropout: 0.0

norm: rmsnorm
norm_position: pre
qk_norm: false

pos_encoding: none   # ABLATED from rope
rope_theta: 10000.0  # unused

ffn: swiglu
ffn_mult: 2.6667

attention: mha_gqa

tie_embeddings: true
init: gpt2
