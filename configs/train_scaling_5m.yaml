# Wave G -- mini scaling law, N=5M point. Fixed 200M-token budget across all 4 sizes (5/10/25/50M)
# so only param count varies -- fit L(N) = a*N^-alpha + c and compare alpha to Chinchilla's ~0.34.
# Same corpus/repetition (~11.3 epochs over the 17.66M-token books+dictionary pool) at every size.
# lr is held FIXED at 1e-3 across all sizes (not muP-tuned per size) -- a real caveat for the
# writeup, see D-045.

seed: 1337
model_config: configs/model_scaling_5m.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 60    # ~2% of max_steps (D-021 convention)
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 64     # CUDA sweet spot (D-043) -- this wave always runs on the 5090
  grad_accum: 2       # effective batch = 64 * 2 * 512 = 65,536 tokens/step

max_steps: 3050       # 3050 * 65,536 ~= 199.9M tokens (spec's "fixed 200M tokens")

eval:
  eval_every: 150
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 300
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 20
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 500

phase: 5
tier: S
baseline_run: "-"
variable_changed: "n_params=5.00M (d_model=128,n_layers=15) @ fixed 200M tokens -- Wave G mini scaling law"
