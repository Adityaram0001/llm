# Phase 8 Part A — supervised fine-tune the S-tier baseline into a dictionary-QA chat model.
# Base = p4_s_baseline (the ratified S-tier reference, D-025), SFT data = phase-7 factory output.
seed: 1337
model_config: configs/model_s.yaml            # must match the base checkpoint's architecture
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
base_checkpoint: experiments/20260711_p4_s-baseline/ckpt/best.pt
train_file: data/sft/sft_dictionary_qa/train.jsonl
val_file: data/sft/sft_dictionary_qa/val.jsonl

# Catastrophic-forgetting probe: plain next-token CE on the pretrain val set (books+dictionary).
pretrain_val_bin: data/tokenized/hf_bpe_16k/val.bin
pretrain_val_seq_len: 512
pretrain_val_batches: 16
pretrain_val_batch_size: 16

max_len: 128            # every dictionary-QA example fits (p99 ~67 content tokens + markers)
epochs: 3
batch_size: 32
supervise_eot: true     # supervise the assistant-ending <|endoftext|> so the model learns to stop

lr: 2.0e-5              # low LR is the main catastrophic-forgetting guard (spec: 1e-5..5e-5)
lr_min_ratio: 0.1
warmup_ratio: 0.03
weight_decay: 0.0
betas: [0.9, 0.95]
grad_clip: 1.0

eval_every: 25
sample_every: 25
sample_prompts:
  - "What does ephemeral mean?"
  - "Define 'philosophy'."
  - "What is a 'go-between'?"

precision: bf16

phase: 8
tier: S
baseline_run: "20260711_p4_s-baseline"
variable_changed: "sft: full fine-tune on dictionary-QA"
