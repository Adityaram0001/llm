# p4_smoke -- short end-to-end pipeline check (warmup, eval, sampling, checkpoint, resume all
# exercised) before committing to the ~1-2h p4_s_baseline run. Same architecture/data as
# baseline, just far fewer steps.

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 10
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 16
  grad_accum: 8

max_steps: 150

eval:
  eval_every: 25
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 50
  max_new_tokens: 60
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 5
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 50

phase: 4
tier: S
baseline_run: "-"
variable_changed: "-"
