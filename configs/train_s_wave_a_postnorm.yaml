# Phase 5, Wave A run 2/4: pre-norm -> post-norm. Identical to train_s_baseline.yaml (D-021)
# except model_config (norm_position=post). Expected: less stable / worse loss (negative result
# on purpose, per phase5_ablations.md).

seed: 1337
model_config: configs/model_s_postnorm.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 16
  grad_accum: 8

max_steps: 1500

eval:
  eval_every: 100
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 200
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 250

phase: 5
tier: S
baseline_run: "20260711_p4_s-baseline"
variable_changed: "norm_position=post (vs baseline's pre)"
