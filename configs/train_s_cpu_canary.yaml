# Portability canary (phase 4 deliverable 0b): tiny, fast run whose only purpose is proving
# the engine runs unchanged with device: cpu (docs/CLOUD.md's portability rule) -- not a real
# experiment, just the acceptance test for "will this also run on a rented CUDA box."

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 2
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 4
  grad_accum: 2

max_steps: 10

eval:
  eval_every: 5
  eval_batches: 4
  eval_batch_size: 4

sampling:
  sample_every: 5
  max_new_tokens: 20
  prompts:
    - "Once upon a time"

logging:
  log_every: 2
  wandb_project: llm-lab
  wandb_mode: disabled

checkpoint_every: 5
device: cpu

phase: 4
tier: S
baseline_run: "-"
variable_changed: "-"
