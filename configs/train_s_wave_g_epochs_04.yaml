# Wave G -- multi-epoch overfitting lab: 4 epochs over the books-only pool (14,141,233 tokens,
# D-045). Books-only (no dictionary) so short structured dictionary entries don't confound a
# "prose memorization" study; eval against the matching books-only val split, not the general
# val.bin, for an apples-to-apples train/val gap.

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_only
    path: data/tokenized/hf_bpe_16k/books_only.bin
    weight: 1.0

val_sources:
  - name: books_only_val
    path: data/tokenized/hf_bpe_16k/books_only_val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 40
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 64
  grad_accum: 2       # effective batch = 65,536 tokens/step

max_steps: 864        # 864 * 65,536 ~= 56.6M tokens ~= 4 epochs over the 14.14M-token pool

eval:
  eval_every: 40
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 150
  max_new_tokens: 80
  prompts:
    - "Once upon a time"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 144

phase: 5
tier: S
baseline_run: "-"
variable_changed: "n_epochs=4 over books-only pool -- Wave G multi-epoch overfitting lab"
