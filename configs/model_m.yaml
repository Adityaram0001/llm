# M-tier — confirmation runs (few hours on MPS). See D-015 for the sizing derivation.
#
# Param breakdown (vocab=16000, tied embeddings, head_dim=64, swiglu ffn_mult=8/3):
#   embed   5.12M  (14.8%)
#   attn    9.83M
#   ffn    19.65M
#   norms   0.02M
#   ---------------
#   total  34.62M  (active/non-embedding: 29.50M)

vocab_size: 16000
d_model: 320
n_layers: 24
n_heads: 5
n_kv_heads: 5       # == n_heads -> plain MHA; set < n_heads for a GQA/MQA ablation
head_dim: 64
max_seq_len: 512    # matches CLAUDE.md's default training seq_len
dropout: 0.0        # modern pretraining default (D-016); revisit only if overfitting on repeats

norm: rmsnorm
norm_position: pre
qk_norm: false

pos_encoding: rope
rope_theta: 10000.0

ffn: swiglu
ffn_mult: 2.6667    # 8/3: keeps SwiGLU's 3-matrix param count ~= a 4x-hidden GELU MLP's 2 (D-016)

attention: mha_gqa

tie_embeddings: true
init: gpt2
