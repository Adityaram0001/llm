# Wave G -- domain-mix ablation (RW-4): 50% finance/self-help/wisdom domain share.
# Fixed-token-budget comparison across {0,10,25,50}% domain share -- see D-045 for why this wave
# uses a SMALLER fixed budget (49.15M tokens, not the usual ~98.3M) than every other S-tier wave:
# the domain pool is only 6.76M raw tokens (D-045), and the spec's own "domain repetition <=4
# epochs" design constraint would be violated by the 50%-share point at the standard budget.
# val_loss here is therefore NOT directly comparable to the D-035 noise floor (different budget)
# -- only compare the 4 domain-mix runs against each other, all at this same budget/seed.

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 0.50
  - name: domain_books
    path: data/tokenized/hf_bpe_16k/domain_books.bin
    weight: 0.50

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 15    # ~2% of max_steps, matches baseline's warmup/max_steps ratio (D-021)
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 64     # CUDA sweet spot (D-043) -- this wave always runs on the 5090
  grad_accum: 2       # effective batch = 64 * 2 * 512 = 65,536 tokens/step, same as baseline

max_steps: 750        # 750 * 65,536 ~= 49.15M tokens (D-045's reduced budget for this wave)

eval:
  eval_every: 50
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 100
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 125

phase: 5
tier: S
baseline_run: "-"
variable_changed: "domain_share=0.5 (finance/self-help/wisdom mixed into training stream at 50%) -- Wave G domain-mix ablation"
