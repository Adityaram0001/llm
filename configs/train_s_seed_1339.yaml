# Phase 5 seed-noise study, run 3/3 (see docs/phases/phase5_ablations.md "Standing protocol").
# Identical to train_s_baseline.yaml (D-021 hyperparameters) except `seed` -- everything else,
# including micro_batch/grad_accum, must stay fixed so the ONLY variable is seed (EXPERIMENTS.md
# ablation protocol rule 1). Baseline run 20260711_p4_s-baseline (seed=1337) is seed 1/3.

seed: 1339
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 16     # kept identical to baseline -- do not tune for GPU here, seed is the only variable
  grad_accum: 8        # effective batch = 16 * 8 * 512 = 65,536 tokens/step, same as baseline

max_steps: 1500        # 1500 * 65,536 ~= 98.3M tokens, matches baseline

eval:
  eval_every: 100
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 200
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 250

phase: 5
tier: S
baseline_run: "20260711_p4_s-baseline"
variable_changed: "seed=1339 (vs baseline's 1337) -- seed-noise study run 3/3"
