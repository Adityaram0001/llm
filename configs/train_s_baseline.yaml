# S-tier baseline pretrain (p4_s_baseline) -- THE reference run for phase 4/5 comparisons.
# Hyperparameters chosen in D-021 (session 2026-07-11): lr and effective batch follow the
# nanoGPT "tiny" ~10M-param reference config rather than GPT-2-scale conventions, since our
# S-tier (9.71M params) is much closer in size to that reference than to GPT-2-small (124M).

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3          # D-021: nanoGPT-tiny analog + GPT-3 lr-vs-log(params) formula both ~1e-3
  lr_min_ratio: 0.1   # cosine floor = 1e-4
  warmup_steps: 30    # ~2% of max_steps
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 16     # D-008's measured MPS throughput-plateau micro-batch at seq_len 512
  grad_accum: 8       # effective batch = 16 * 8 * 512 = 65,536 tokens/step (D-021)

max_steps: 1500       # 1500 * 65,536 ~= 98.3M tokens, matches spec's "~100M tokens" target

eval:
  eval_every: 100      # D-021: frequent eval, S-tier steps are cheap
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 200
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline   # D-009

checkpoint_every: 250

phase: 4
tier: S
baseline_run: "-"
variable_changed: "-"
