# Phase 6: identical recipe to train_s_baseline.yaml (D-021), re-run purely to capture
# early/mid/final milestone snapshots of ONE trajectory for notebooks/08_eval_deep_dive.ipynb --
# the original p4_s_baseline run only ever kept latest.pt/best.pt. Same seed, same data order
# (loader is stateless in (seed, step), D-021), so this doubles as an incidental reproducibility
# check of the original baseline's loss curve. Run on the RTX 5090 (D-043: micro_batch=64 is its
# measured sweet spot, not the Mac-tuned 16 -- grad_accum halved to 2 to keep the effective batch
# at 65,536 tokens/step identical to the original).

seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512

sources:
  - name: books_dict
    path: data/tokenized/hf_bpe_16k/train.bin
    weight: 1.0

val_sources:
  - name: books_dict_val
    path: data/tokenized/hf_bpe_16k/val.bin
    weight: 1.0

optim:
  lr: 1.0e-3
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

batch:
  micro_batch: 64      # D-043: RTX 5090 sweet spot (vs Mac-tuned 16)
  grad_accum: 2         # effective batch = 64 * 2 * 512 = 65,536 tokens/step -- unchanged

max_steps: 1500

eval:
  eval_every: 100
  eval_batches: 32
  eval_batch_size: 16

sampling:
  sample_every: 200
  max_new_tokens: 80
  prompts:
    - "Once upon a time"
    - "ephemeral (adjective):"

logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline

checkpoint_every: 250
milestone_steps: [150, 750, 1500]   # early / mid / final for the eval_deep_dive notebook

phase: 6
tier: S
baseline_run: "20260711_p4_s-baseline"
variable_changed: "milestone_steps added (early/mid/final snapshots), micro_batch=64 (cloud sweet spot) instead of 16 -- otherwise identical recipe, same seed"
