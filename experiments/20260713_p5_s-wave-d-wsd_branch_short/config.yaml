seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_dict
  path: data/tokenized/hf_bpe_16k/train.bin
  weight: 1.0
val_sources:
- name: books_dict_val
  path: data/tokenized/hf_bpe_16k/val.bin
  weight: 1.0
logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline
phase: 5
tier: S
batch:
  micro_batch: 64
  grad_accum: 2
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  optimizer: adamw
  schedule: wsd
  wsd_decay_ratio: 0.0909
  z_loss_weight: 0.0
max_steps: 1650
eval:
  eval_every: 25
  eval_batches: 32
  eval_batch_size: 16
sampling:
  sample_every: 1000
  max_new_tokens: 80
  prompts:
  - Once upon a time
  - 'ephemeral (adjective):'
checkpoint_every: 50
baseline_run: 20260713_p5_s-wave-d-constant
variable_changed: 'WSD multi-budget bonus: decay tail forked @step1500 from wave_d_constant''s
  checkpoint, 150-step short budget (+10.0% tokens)'
