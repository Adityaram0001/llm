seed: 1337
model_config: configs/model_s_attn_mla.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_dict
  path: data/tokenized/hf_bpe_16k/train.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
val_sources:
- name: books_dict_val
  path: data/tokenized/hf_bpe_16k/val.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
batch:
  micro_batch: 16
  grad_accum: 8
max_steps: 1500
eval:
  eval_every: 100
  eval_batches: 32
  eval_batch_size: 16
sampling:
  sample_every: 200
  max_new_tokens: 80
  prompts:
  - Once upon a time
  - 'ephemeral (adjective):'
logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline
device: null
checkpoint_every: 250
phase: 5
tier: S
baseline_run: 20260713_p5_s-wave-c-mha
variable_changed: attention=MLA (vs Wave C MHA control), kv_lora_rank=128
