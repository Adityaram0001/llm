seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_dict
  path: data/tokenized/hf_bpe_16k/train.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
val_sources:
- name: books_dict_val
  path: data/tokenized/hf_bpe_16k/val.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 30
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  optimizer: adamw
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_ns_steps: 5
  schedule: cosine
  wsd_decay_ratio: 0.2
  z_loss_weight: 0.0
batch:
  micro_batch: 64
  grad_accum: 32
max_steps: 94
eval:
  eval_every: 6
  eval_batches: 32
  eval_batch_size: 16
sampling:
  sample_every: 12
  max_new_tokens: 80
  prompts:
  - Once upon a time
  - 'ephemeral (adjective):'
logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline
device: null
checkpoint_every: 16
phase: 5
tier: S
baseline_run: 20260713_p5_s-wave-d-control
variable_changed: effective_batch=1,048,576 tok/step (vs control's 65,536), same ~98.3M
  token budget (94 steps)
