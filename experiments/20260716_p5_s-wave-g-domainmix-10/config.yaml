seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_dict
  path: data/tokenized/hf_bpe_16k/train.bin
  weight: 0.9
  respect_doc_boundaries: false
  docstarts_path: null
- name: domain_books
  path: data/tokenized/hf_bpe_16k/domain_books.bin
  weight: 0.1
  respect_doc_boundaries: false
  docstarts_path: null
val_sources:
- name: books_dict_val
  path: data/tokenized/hf_bpe_16k/val.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 15
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  optimizer: adamw
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_ns_steps: 5
  schedule: cosine
  wsd_decay_ratio: 0.2
  z_loss_weight: 0.0
batch:
  micro_batch: 64
  grad_accum: 2
max_steps: 750
eval:
  eval_every: 50
  eval_batches: 32
  eval_batch_size: 16
sampling:
  sample_every: 100
  max_new_tokens: 80
  prompts:
  - Once upon a time
  - 'ephemeral (adjective):'
logging:
  log_every: 10
  wandb_project: llm-lab
  wandb_mode: offline
device: null
checkpoint_every: 125
precision: bf16
gradient_checkpointing: false
compile: false
phase: 5
tier: S
baseline_run: '-'
variable_changed: domain_share=0.1 (finance/self-help/wisdom mixed into training stream
  at 10%) -- Wave G domain-mix ablation
