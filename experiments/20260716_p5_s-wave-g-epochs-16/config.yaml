seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_only
  path: data/tokenized/hf_bpe_16k/books_only.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
val_sources:
- name: books_only_val
  path: data/tokenized/hf_bpe_16k/books_only_val.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 170
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  optimizer: adamw
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_ns_steps: 5
  schedule: cosine
  wsd_decay_ratio: 0.2
  z_loss_weight: 0.0
batch:
  micro_batch: 64
  grad_accum: 2
max_steps: 3456
eval:
  eval_every: 100
  eval_batches: 32
  eval_batch_size: 16
sampling:
  sample_every: 500
  max_new_tokens: 80
  prompts:
  - Once upon a time
logging:
  log_every: 20
  wandb_project: llm-lab
  wandb_mode: offline
device: null
checkpoint_every: 576
precision: bf16
gradient_checkpointing: false
compile: false
phase: 5
tier: S
baseline_run: '-'
variable_changed: n_epochs=16 over books-only pool -- Wave G multi-epoch overfitting
  lab
