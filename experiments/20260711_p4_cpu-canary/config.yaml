seed: 1337
model_config: configs/model_s.yaml
tokenizer_dir: data/tokenized/tokenizers/hf_bpe_16k
seq_len: 512
sources:
- name: books_dict
  path: data/tokenized/hf_bpe_16k/train.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
val_sources:
- name: books_dict_val
  path: data/tokenized/hf_bpe_16k/val.bin
  weight: 1.0
  respect_doc_boundaries: false
  docstarts_path: null
optim:
  lr: 0.001
  lr_min_ratio: 0.1
  warmup_steps: 2
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  grad_clip: 1.0
batch:
  micro_batch: 4
  grad_accum: 2
max_steps: 10
eval:
  eval_every: 5
  eval_batches: 4
  eval_batch_size: 4
sampling:
  sample_every: 5
  max_new_tokens: 20
  prompts:
  - Once upon a time
logging:
  log_every: 2
  wandb_project: llm-lab
  wandb_mode: disabled
device: cpu
checkpoint_every: 5
phase: 4
tier: S
baseline_run: '-'
variable_changed: '-'
